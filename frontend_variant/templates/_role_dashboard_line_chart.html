{% set chart = line_chart %}
<div class="dash-line-chart">
    <svg class="dash-line-svg" viewBox="0 0 790 300" preserveAspectRatio="none" aria-label="销售金额和采购金额趋势">
        {% for item in chart.grid|reverse %}
        <line class="dash-grid-line" x1="{{ chart.grid_x0 }}" y1="{{ item.y }}" x2="{{ chart.grid_x1 }}" y2="{{ item.y }}"></line>
        <text class="dash-chart-label" x="5" y="{{ item.y + 4 }}">{{ item.label }}</text>
        {% endfor %}
        <path class="dash-area-a" d="{{ chart.area_a|safe }}"></path>
        <path class="dash-series-a" d="{{ chart.path_a|safe }}"></path>
        <path class="dash-series-b" d="{{ chart.path_b|safe }}"></path>
        {% for point in chart.points_a %}
        <circle class="dash-point-a" cx="{{ point.x }}" cy="{{ point.y }}" r="4"></circle>
        {% endfor %}
        {% for point in chart.points_b %}
        <circle class="dash-point-b" cx="{{ point.x }}" cy="{{ point.y }}" r="4"></circle>
        {% endfor %}
        {% for label in chart.labels %}
        <text class="dash-chart-label" x="{{ label.x }}" y="{{ chart.label_y }}">{{ label.text }}</text>
        {% endfor %}
    </svg>
    <div class="dash-legend">
        <span><i style="--c: var(--accent)"></i>{{ chart.series_a_label }}</span>
        <span><i style="--c: var(--warn)"></i>{{ chart.series_b_label }}</span>
    </div>
</div>
