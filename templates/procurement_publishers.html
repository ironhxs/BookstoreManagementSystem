<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出版社管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/procurement-premium-bg.png?v=4') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 0;
        }

        .main-card {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 7vh auto;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #198754;
            text-align: center;
            margin-bottom: 2rem;
        }

        .table {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .btn-success {
            min-width: 60px;
        }

        .alert {
            margin-bottom: 1rem;
        }

        .back-link {
            margin-top: 1.5rem;
        }

        .form-inline .form-control {
            width: auto;
            display: inline-block;
        }

        .form-inline .btn {
            vertical-align: middle;
        }

        .btn-sm {
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success" style="z-index:1;">
        <div class="container">
            <a class="navbar-brand" href="/procurement">
                <i class="fas fa-user-tie me-2"></i>采购员
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/procurement">
                    <i class="fas fa-home me-1"></i>主页
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-building me-2"></i>出版社管理</h2>
        {% if msg %}
        <div class="alert alert-info alert-dismissible fade show" role="alert">
            <i class="fas fa-info-circle me-2"></i>{{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="关闭"></button>
        </div>
        {% endif %}
        <form class="row g-3 mb-4" method="get">
            <div class="col-auto">
                <input type="text" class="form-control" name="search_name" placeholder="搜索出版社名"
                    value="{{ search_name }}">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-outline-success"><i class="fas fa-search me-1"></i>搜索</button>
            </div>
        </form>
        <form method="post" class="mb-4">
            <input type="hidden" name="action" value="add">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">出版社名</label>
                    <input type="text" class="form-control" name="publisher_id" required title="出版社名"
                        placeholder="出版社名">
                </div>
                <div class="col-md-3">
                    <label class="form-label">地址</label>
                    <input type="text" class="form-control" name="address" required title="地址" placeholder="地址">
                </div>
                <div class="col-md-2">
                    <label class="form-label">电话</label>
                    <input type="text" class="form-control" name="phone" required title="电话" placeholder="电话">
                </div>
                <div class="col-md-2">
                    <label class="form-label">联系人</label>
                    <input type="text" class="form-control" name="contact_person" required title="联系人"
                        placeholder="联系人">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100"><i class="fas fa-plus me-1"></i>添加出版社</button>
                </div>
            </div>
        </form>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-success">
                    <tr>
                        <th>出版社名</th>
                        <th>地址</th>
                        <th>电话</th>
                        <th>联系人</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% if publishers %}
                    {% for pub in publishers %}
                    <tr>
                        <form method="post">
                            <input type="hidden" name="action" value="edit">
                            <input type="hidden" name="publisher_id" value="{{ pub[0] }}">
                            <td>{{ pub[0] }}</td>
                            <td><input type="text" class="form-control" name="address" value="{{ pub[1] }}" required
                                    title="地址" placeholder="地址"></td>
                            <td><input type="text" class="form-control" name="phone" value="{{ pub[2] }}" required
                                    title="电话" placeholder="电话"></td>
                            <td><input type="text" class="form-control" name="contact_person" value="{{ pub[3] }}"
                                    required title="联系人" placeholder="联系人"></td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <button type="submit" class="btn btn-outline-primary btn-sm me-2"><i
                                            class="fas fa-save"></i> 保存</button>
                        </form>
                        <form method="post">
                            <input type="hidden" name="action" value="delete">
                            <input type="hidden" name="publisher_id" value="{{ pub[0] }}">
                            <button type="submit" class="btn btn-outline-danger btn-sm"><i class="fas fa-trash"></i>
                                删除</button>
                        </form>
        </div>
        </td>
        </tr>
        {% endfor %}
        {% else %}
        <tr>
            <td colspan="5" class="text-center text-muted"><i class="fas fa-check-circle me-2"></i>暂无出版社信息
            </td>
        </tr>
        {% endif %}
        </tbody>
        </table>
    </div>
    <div class="text-center back-link mt-3">
        <a href="/procurement" class="btn btn-outline-success"><i class="fas fa-arrow-left me-1"></i>返回采购员主页</a>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
