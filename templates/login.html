<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 书店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/图书进销货管理系统.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            max-width: 400px;
            margin: 8vh auto;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .login-title {
            font-weight: bold;
            color: #dc3545;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 500;
        }

        .form-control {
            border-radius: 0.5rem;
        }

        .login-btn {
            width: 100%;
            font-weight: bold;
        }

        .login-icon {
            color: #dc3545;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .alert {
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <div class="login-card shadow">
        <div class="text-center">
            <i class="fas fa-book-open login-icon"></i>
            <h2 class="login-title">书店管理系统登录</h2>
        </div>
        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="关闭"></button>
        </div>
        {% endif %}
        <form method="post">
            <div class="mb-3">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus
                    placeholder="请输入用户名">
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-danger login-btn">登录</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
