<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 书店管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/login-hero-generated.png?v=1') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at center, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.03) 45%),
                linear-gradient(115deg, rgba(20, 42, 69, 0.1), rgba(255, 255, 255, 0.08), rgba(31, 91, 166, 0.12));
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: min(420px, calc(100vw - 2rem));
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: 1.25rem;
            box-shadow: 0 1.2rem 3rem rgba(25, 44, 72, 0.18);
            backdrop-filter: blur(14px);
            padding: 2.5rem 2.15rem 2.1rem 2.15rem;
        }

        .login-title {
            font-weight: bold;
            color: #1f5ba6;
            text-align: center;
            margin-bottom: 0.35rem;
            letter-spacing: 0.02em;
        }

        .login-subtitle {
            color: #6b7280;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 500;
        }

        .form-control {
            border-radius: 0.5rem;
        }

        .login-btn {
            width: 100%;
            font-weight: bold;
            border: none;
            border-radius: 0.65rem;
            background: linear-gradient(135deg, #b3313c, #1f5ba6);
            box-shadow: 0 0.55rem 1.2rem rgba(31, 91, 166, 0.2);
        }

        .login-icon {
            color: #b3313c;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .demo-account {
            margin-top: 1rem;
            padding: 0.7rem 0.85rem;
            border-radius: 0.75rem;
            background: rgba(31, 91, 166, 0.08);
            color: #25405f;
            font-size: 0.9rem;
        }

        .alert {
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <div class="login-card shadow">
        <div class="text-center">
            <i class="fas fa-book-open login-icon"></i>
            <h2 class="login-title">书店管理系统登录</h2>
            <div class="login-subtitle">图书进销货与库存协同管理</div>
        </div>
        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="关闭"></button>
        </div>
        {% endif %}
        <form method="post">
            <div class="mb-3">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus
                    placeholder="请输入用户名">
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-danger login-btn">登录</button>
        </form>
        <div class="demo-account">
            体验账号：<strong>admin1</strong> / <strong>admin123</strong>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
