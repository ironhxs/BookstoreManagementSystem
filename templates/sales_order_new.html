<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建销售订单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/sales-premium-bg.png?v=4') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 0;
        }

        .main-card {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 7vh auto;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #0d6efd;
            text-align: center;
            margin-bottom: 2rem;
        }

        .table {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .btn-primary,
        .btn-outline-primary {
            min-width: 60px;
        }

        .alert {
            margin-bottom: 1rem;
        }

        .back-link {
            margin-top: 1.5rem;
        }

        .stock-info {
            font-size: 0.95em;
        }
    </style>
    <script>
        function addDetailRow() {
            const table = document.getElementById('details_table');
            const row = table.insertRow(-1);
            row.innerHTML = `
            <td><select name="book_id" required title="选择图书" onchange="showStock(this)">${window.book_options}</select><span class="stock-info text-info ms-2"></span></td>
            <td><input type="number" name="quantity" min="1" required title="数量" placeholder="数量"></td>
            <td><input type="number" name="sale_price" min="0" step="0.01" required title="销售价格" placeholder="销售价格"></td>
            <td><button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentNode.parentNode.remove()">删除</button></td>
        `;
            // 初始化新行的库存显示
            const select = row.querySelector('select[name="book_id"]');
            showStock(select);
            select.addEventListener('change', function () { showStock(this); });
        }
    </script>
</head>

<body>
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" style="z-index:1;">
        <div class="container">
            <a class="navbar-brand" href="/sales">
                <i class="fas fa-user-tag me-2"></i>销售员
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/sales">
                    <i class="fas fa-home me-1"></i>主页
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-plus me-2"></i>新建销售订单</h2>
        {% if msg %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert" id="errorAlert">
            <i class="fas fa-exclamation-triangle me-2"></i>{{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="关闭"></button>
        </div>
        <script>
            setTimeout(function () {
                var alertElem = document.getElementById('errorAlert');
                if (alertElem) {
                    var alert = new bootstrap.Alert(alertElem);
                    alert.close();
                }
            }, 5000);
        </script>
        {% endif %}
        <form method="post">
            <div class="mb-3">
                <label class="form-label" for="customer">客户</label>
                <input type="text" class="form-control" name="customer" id="customer" required placeholder="客户名"
                    title="客户">
            </div>
            <div class="mb-3">
                <label class="form-label" for="notes">备注</label>
                <input type="text" class="form-control" name="notes" id="notes" placeholder="可选" title="备注">
            </div>
            <div class="mb-3">
                <label class="form-label" for="sale_date">销售日期</label>
                <input type="datetime-local" class="form-control" name="sale_date" id="sale_date"
                    value="{{ request.form.get('sale_date', '') }}" required>
            </div>
            <h4 class="mb-3">销售明细</h4>
            <div class="table-responsive">
                <table class="table table-bordered align-middle" id="details_table">
                    <thead class="table-primary">
                        <tr>
                            <th>图书</th>
                            <th>数量</th>
                            <th>销售价格</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <select name="book_id" required title="选择图书" onchange="showStock(this)">
                                    {% for book in books %}
                                    <option value="{{ book[0] }}" data-stock="{{ book[2] }}">{{ book[0] }} - {{ book[1]
                                        }}（库存：{{ book[2] }}）</option>
                                    {% endfor %}
                                </select>
                                <span class="stock-info text-info ms-2"></span>
                            </td>
                            <td><input type="number" name="quantity" min="1" required title="数量" placeholder="数量"></td>
                            <td><input type="number" name="sale_price" min="0" step="0.01" required title="销售价格"
                                    placeholder="销售价格"></td>
                            <td><button type="button" class="btn btn-outline-danger btn-sm"
                                    onclick="this.parentNode.parentNode.remove()">删除</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <button type="button" class="btn btn-outline-primary mb-3" onclick="addDetailRow()"><i
                    class="fas fa-plus me-1"></i>添加明细</button>
            <br>
            <button type="submit" class="btn btn-primary">提交订单</button>
        </form>
        <div class="text-center back-link mt-3">
            <a href="{{ url_for('sales_orders') }}" class="btn btn-outline-primary"><i
                    class="fas fa-arrow-left me-1"></i>返回订单列表</a>
        </div>
    </div>
    <script>
        // 生成下拉选项HTML字符串，供JS动态插入
        var bookOptions = `{% for book in books %}<option value='{{ book[0] }}' data-stock='{{ book[2] }}'>{{ book[0] }} - {{ book[1] }}（库存：{{ book[2] }}）</option>{% endfor %}`;
        document.addEventListener('DOMContentLoaded', function () {
            window.book_options = bookOptions;
            // 初始化所有select的库存显示
            document.querySelectorAll('select[name="book_id"]').forEach(function (sel) {
                showStock(sel);
                sel.addEventListener('change', function () { showStock(this); });
            });
            // 设置销售日期默认值为当前时间
            var saleDateInput = document.getElementById('sale_date');
            if (saleDateInput && !saleDateInput.value) {
                var now = new Date();
                var local = now.toISOString().slice(0, 16);
                saleDateInput.value = local;
            }
        });
        function showStock(selectElem) {
            var stock = selectElem.options[selectElem.selectedIndex].getAttribute('data-stock');
            var infoSpan = selectElem.parentNode.querySelector('.stock-info');
            // if (infoSpan) {
            //     infoSpan.textContent = '当前库存：' + stock;
            // }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
