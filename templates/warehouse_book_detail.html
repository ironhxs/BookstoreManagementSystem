<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/仓库管理员.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 0;
        }

        .main-card {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 10vh auto;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #0d6efd;
            text-align: center;
            margin-bottom: 2rem;
        }

        .book-cover {
            max-width: 140px;
            max-height: 180px;
            border-radius: 0.5rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.08);
            margin-bottom: 1.2rem;
        }

        .info-list {
            font-size: 1.1rem;
        }

        .info-list strong {
            width: 5.5em;
            display: inline-block;
            color: #0d6efd;
        }

        .back-link {
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" style="z-index:1;">
        <div class="container">
            <a class="navbar-brand" href="/warehouse">
                <i class="fas fa-warehouse me-2"></i>仓库管理员
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/warehouse">
                    <i class="fas fa-home me-1"></i>主页
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-book-open me-2"></i>图书详情</h2>
        <div class="text-center mb-4">
            <img src="/pic/book/{{ book[1] }}.png" alt="封面" class="book-cover" onerror="this.src='/pic/book/暂无封面.png'">
        </div>
        <div class="info-list">
            <p><strong>图书ID：</strong>{{ book[0] }}</p>
            <p><strong>书名：</strong>{{ book[1] }}</p>
            <p><strong>作者：</strong>{{ book[2] }}</p>
            <p><strong>定价：</strong>{{ book[3] }}</p>
            <p><strong>出版社：</strong>{{ book[4] }}</p>
            <p><strong>出版社地址：</strong>{{ book[5] }}</p>
            <p><strong>类别号：</strong>{{ book[6] }}</p>
            <p><strong>类别：</strong>{{ book[7] }}</p>
        </div>
        <div class="text-center back-link">
            <a href="/warehouse/books" class="btn btn-outline-primary"><i class="fas fa-arrow-left me-1"></i>返回图书信息</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
