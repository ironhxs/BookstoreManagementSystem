<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全表管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/系统管理员.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .main-card {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 7vh auto;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #dc3545;
            text-align: center;
            margin-bottom: 2rem;
        }

        .table {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .form-label,
        th {
            font-weight: 500;
        }

        .btn-danger,
        .btn-success,
        .btn-primary {
            min-width: 60px;
        }

        .alert {
            margin-bottom: 1rem;
        }

        .back-link {
            margin-top: 1.5rem;
        }

        input,
        select {
            width: 100%;
            min-width: 80px;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger" style="z-index:2;">
        <div class="container">
            <a class="navbar-brand" href="/admin">
                <i class="fas fa-user-shield me-2"></i>系统管理员
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin">
                    <i class="fas fa-home me-1"></i>主页
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-table me-2"></i>全表管理</h2>
        {% if msg %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>{{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="关闭"></button>
        </div>
        {% endif %}
        <form method="get" class="row g-3 align-items-center mb-3">
            <div class="col-auto">
                <label class="form-label" for="table">选择表:</label>
                <select class="form-select" name="table" id="table" onchange="this.form.submit()" title="选择表">
                    {% for t in table_map.keys() %}
                    <option value="{{ t }}" {% if t==table %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label" for="search">搜索:</label>
                <input type="text" class="form-control" name="search" id="search" value="{{ search }}"
                    placeholder="输入关键字" title="搜索">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">搜索</button>
                {% if search %}<a href="{{ url_for('admin_manage', table=table) }}"
                    class="btn btn-secondary ms-2">清除</a>{% endif %}
            </div>
        </form>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-danger">
                    <tr>
                        {% for col in columns_zh %}<th>{{ col }}</th>{% endfor %}
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 新增行 -->
                    <tr>
                        <form method="post">
                            {% for col in columns %}
                            <td><input type="text" class="form-control" name="{{ col }}"
                                    placeholder="{{ columns_zh[loop.index0] }}" title="{{ columns_zh[loop.index0] }}">
                            </td>
                            {% endfor %}
                            <td>
                                <input type="hidden" name="action" value="add">
                                <button type="submit" class="btn btn-success">添加</button>
                            </td>
                        </form>
                    </tr>
                    <!-- 数据行 -->
                    {% for row in rows %}
                    <tr>
                        <form method="post">
                            {% for col in columns %}
                            <td><input type="text" class="form-control" name="{{ col }}" value="{{ row[loop.index0] }}"
                                    {% if loop.index0==0 %}readonly{% endif %}
                                    placeholder="{{ columns_zh[loop.index0] }}" title="{{ row[loop.index0] }}">
                            </td>
                            {% endfor %}
                            <td>
                                <input type="hidden" name="action" value="edit">
                                <button type="submit" class="btn btn-primary">保存</button>
                            </td>
                        </form>
                        <form method="post" style="display:inline;">
                            <input type="hidden" name="action" value="delete">
                            <input type="hidden" name="{{ columns[0] }}" value="{{ row[0] }}">
                            <td><button type="submit" class="btn btn-danger">删除</button></td>
                        </form>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="text-center back-link">
            <a href="/admin" class="btn btn-outline-danger"><i class="fas fa-arrow-left me-1"></i>返回主页</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
