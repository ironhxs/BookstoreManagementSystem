<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户权限管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/admin-premium-bg.png?v=4') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .main-card {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 7vh auto;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #dc3545;
            text-align: center;
            margin-bottom: 2rem;
        }

        .table {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .form-label,
        th {
            font-weight: 500;
        }

        .btn-danger,
        .btn-success {
            min-width: 60px;
        }

        .alert {
            margin-bottom: 1rem;
        }

        .back-link {
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger" style="z-index:2;">
        <div class="container">
            <a class="navbar-brand" href="/admin">
                <i class="fas fa-user-shield me-2"></i>系统管理员
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin">
                    <i class="fas fa-home me-1"></i>主页
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-users-cog me-2"></i>用户权限管理</h2>
        {% if msg %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>{{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="关闭"></button>
        </div>
        {% endif %}
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-danger">
                    <tr>
                        <th>用户名</th>
                        <th>密码</th>
                        <th>角色</th>
                        <th colspan="2">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 新增用户 -->
                    <tr>
                        <form method="post">
                            <td><input type="text" name="username" class="form-control" required placeholder="用户名"
                                    title="用户名"></td>
                            <td><input type="password" name="password" class="form-control" required placeholder="密码"
                                    title="密码"></td>
                            <td>
                                <select name="role" class="form-select" title="角色">
                                    <option value="sys_admin">系统管理员</option>
                                    <option value="procurement_officer">采购员</option>
                                    <option value="warehouse_keeper">仓库管理员</option>
                                    <option value="sales_agent">销售员</option>
                                    <option value="finance_officer">财务人员</option>
                                </select>
                            </td>
                            <td colspan="2">
                                <input type="hidden" name="action" value="add">
                                <button type="submit" class="btn btn-success">添加</button>
                            </td>
                        </form>
                    </tr>
                    <!-- 用户数据行 -->
                    {% for username, info in users.items() %}
                    <tr>
                        <form method="post">
                            <td><input type="text" name="username" value="{{ username }}" readonly class="form-control"
                                    placeholder="用户名" title="用户名"></td>
                            <td><input type="password" name="password" class="form-control" placeholder="输入新密码"
                                    title="输入新密码"></td>
                            <td>
                                <select name="role" class="form-select" title="角色">
                                    <option value="sys_admin" {% if info['role']=='sys_admin' %}selected{% endif %}>
                                        系统管理员</option>
                                    <option value="procurement_officer" {% if info['role']=='procurement_officer'
                                        %}selected{% endif %}>采购员</option>
                                    <option value="warehouse_keeper" {% if info['role']=='warehouse_keeper' %}selected{%
                                        endif %}>仓库管理员</option>
                                    <option value="sales_agent" {% if info['role']=='sales_agent' %}selected{% endif %}>
                                        销售员</option>
                                    <option value="finance_officer" {% if info['role']=='finance_officer' %}selected{%
                                        endif %}>财务人员</option>
                                </select>
                            </td>
                            <td>
                                <input type="hidden" name="action" value="edit">
                                <button type="submit" class="btn btn-primary">保存</button>
                            </td>
                        </form>
                        <form method="post" style="display:inline;">
                            <input type="hidden" name="action" value="delete">
                            <input type="hidden" name="username" value="{{ username }}">
                            <td><button type="submit" class="btn btn-danger">删除</button></td>
                        </form>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="text-center back-link">
            <a href="/admin" class="btn btn-outline-danger"><i class="fas fa-arrow-left me-1"></i>返回主页</a>
        </div>
        <p class="mt-3 text-muted text-center"><small>注意：密码将以加密形式存储到数据库中，无法查看明文密码。</small></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
