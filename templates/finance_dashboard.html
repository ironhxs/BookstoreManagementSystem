<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务人员主页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/财务人员.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 0;
        }

        .main-card {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 10vh auto;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #198754;
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .dashboard-btn {
            width: 100%;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            padding: 1rem 0;
            border-radius: 0.75rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.08);
        }

        .dashboard-btn i {
            margin-right: 0.7em;
        }

        .logout-btn {
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success" style="z-index:1;">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-coins me-2"></i>财务人员
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-coins me-2"></i>财务人员主页</h2>
        <div class="d-grid gap-3">
            <a href="/finance/audit" class="btn btn-success dashboard-btn">
                <i class="fas fa-table"></i>进销明细审核
            </a>
            <a href="/finance/purchase_price" class="btn btn-info dashboard-btn">
                <i class="fas fa-yen-sign"></i>采购价监督
            </a>
            <a href="/finance/book_stats" class="btn btn-primary dashboard-btn">
                <i class="fas fa-chart-line"></i>书籍统计报表
            </a>
            <a href="/finance/low_quantity_books" class="btn btn-warning dashboard-btn">
                <i class="fas fa-exclamation-triangle"></i>库存预警
            </a>
            <a href="/finance/inventory_stats" class="btn btn-secondary dashboard-btn">
                <i class="fas fa-chart-bar"></i>库存统计
            </a>
        </div>
        <div class="text-center logout-btn">
            <a href="/logout" class="btn btn-outline-danger btn-lg"><i class="fas fa-sign-out-alt me-2"></i>退出登录</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
