<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存分类统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {}

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 1;
        }

        .main-card {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 8vh auto;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #0d6efd;
            text-align: center;
            margin-bottom: 2rem;
        }

        .table {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .table thead th {
            background-color: #f2f2f2;
            font-weight: 600;
        }

        .total-row {
            font-weight: bold;
            background-color: #e6f3ff;
        }

        .back-link {
            margin-top: 1.5rem;
        }
    </style>
</head>

<body
    style="background: url('/pic/background/{% if role == '系统管理员' %}admin-premium-bg.png?v=4{% elif role == '仓库管理员' %}warehouse-premium-bg.png?v=4{% elif role == '销售员' %}sales-premium-bg.png?v=4{% elif role == '财务人员' %}finance-premium-bg.png?v=4{% elif role == '采购员' %}procurement-premium-bg.png?v=4{% else %}general-premium-bg.png?v=4{% endif %}') no-repeat center center fixed; background-size: cover; position: relative; min-height: 100vh;">
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" style="z-index:2;">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-chart-bar me-2"></i>库存分类统计
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">
                    <i class="fas fa-user me-1"></i>{{ role }}
                </span>
                <a class="nav-link" href="
                    {% if role == '系统管理员' %}/admin
                    {% elif role == '仓库管理员' %}/warehouse
                    {% elif role == '销售员' %}/sales
                    {% elif role == '财务人员' %}/finance
                    {% elif role == '采购员' %}/procurement
                    {% endif %}" title="返回主界面">
                    <i class="fas fa-home me-1"></i>返回主界面
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-chart-bar me-2"></i>库存分类统计</h2>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                    <tr>
                        <th>分类号</th>
                        <th>图书分类</th>
                        <th>库存总量</th>
                    </tr>
                </thead>
                <tbody>
                    {% for stat in stats %}
                    <tr>
                        <td>{{ stat[0] }}</td>
                        <td>{{ stat[1] }}</td>
                        <td>{{ stat[2] }}</td>
                    </tr>
                    {% endfor %}
                    <tr class="total-row">
                        <td><strong>-</strong></td>
                        <td><strong>总计</strong></td>
                        <td><strong>{{ stats | sum(attribute=2) }}</strong></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="text-center back-link">
            <a href="
                {% if role == '系统管理员' %}/admin
                {% elif role == '仓库管理员' %}/warehouse
                {% elif role == '销售员' %}/sales
                {% elif role == '财务人员' %}/finance
                {% elif role == '采购员' %}/procurement
                {% endif %}" class="btn btn-outline-primary"><i class="fas fa-arrow-left me-1"></i>返回{{ role }}主界面</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
