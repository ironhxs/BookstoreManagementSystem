<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售订单明细</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/sales-premium-bg.png?v=4') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 0;
        }

        .main-card {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 10vh auto;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #fd7e14;
            text-align: center;
            margin-bottom: 2rem;
        }

        .info-list {
            font-size: 1.1rem;
        }

        .info-list strong {
            width: 5.5em;
            display: inline-block;
            color: #fd7e14;
        }

        .back-link {
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#fd7e14;z-index:1;">
        <div class="container">
            <a class="navbar-brand" href="/sales">
                <i class="fas fa-user-tag me-2"></i>销售员
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/sales">
                    <i class="fas fa-home me-1"></i>主页
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-file-alt me-2"></i>销售订单明细</h2>
        <div class="info-list mb-4">
            <p><strong>订单号：</strong>{{ order[0] }}</p>
            <p><strong>客户：</strong>{{ order[1] }}</p>
            <p><strong>日期：</strong>{{ order[2] }}</p>
            <p><strong>备注：</strong>{{ order[3] }}</p>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-warning">
                    <tr>
                        <th>明细号</th>
                        <th>图书ID</th>
                        <th>数量</th>
                        <th>销售价格</th>
                    </tr>
                </thead>
                <tbody>
                    {% for d in details %}
                    <tr>
                        <td>{{ d[0] }}</td>
                        <td>{{ d[1] }}</td>
                        <td>{{ d[2] }}</td>
                        <td>{{ d[3] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="text-center back-link mt-3">
            <a href="{{ url_for('sales_orders') }}" class="btn btn-outline-warning"><i
                    class="fas fa-arrow-left me-1"></i>返回订单列表</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
