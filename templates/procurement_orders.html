<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购订单列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: url('/pic/background/procurement-premium-bg.png?v=4') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .bg-mask {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.5);
            z-index: 0;
        }

        .main-card {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 7vh auto;
            background: rgba(255, 255, 255, 0.88);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            padding: 2.5rem 2rem 2rem 2rem;
        }

        .main-title {
            font-weight: bold;
            color: #198754;
            text-align: center;
            margin-bottom: 2rem;
        }

        .table {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .btn-success {
            min-width: 60px;
        }

        .alert {
            margin-bottom: 1rem;
        }

        .back-link {
            margin-top: 1.5rem;
        }

        .order-status {
            font-size: 0.95em;
        }
    </style>
</head>

<body>
    <div class="bg-mask"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success" style="z-index:1;">
        <div class="container">
            <a class="navbar-brand" href="/procurement">
                <i class="fas fa-user-tie me-2"></i>采购员
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/procurement">
                    <i class="fas fa-home me-1"></i>主页
                </a>
                <a class="nav-link" href="/logout">
                    <i class="fas fa-sign-out-alt me-1"></i>退出
                </a>
            </div>
        </div>
    </nav>
    <div class="main-card shadow">
        <h2 class="main-title"><i class="fas fa-list me-2"></i>采购订单列表</h2>
        {% if msg %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>{{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="关闭"></button>
        </div>
        {% endif %}
        <div class="mb-3 text-end">
            <a href="{{ url_for('procurement_order_new') }}" class="btn btn-success"><i
                    class="fas fa-plus me-1"></i>新建订单</a>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-success">
                    <tr>
                        <th>订单ID</th>
                        <th>采购员</th>
                        <th>创建时间</th>
                        <th>备注</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% if orders %}
                    {% for order in orders %}
                    <tr>
                        <td>{{ order[0] }}</td>
                        <td>{{ order[1] }}</td>
                        <td>{{ order[2].strftime('%Y-%m-%d %H:%M') if order[2] else '未知' }}</td>
                        <td>{{ order[3] or '' }}</td>
                        <td>
                            <a href="{{ url_for('procurement_order_detail', order_id=order[0]) }}"
                                class="btn btn-outline-info btn-sm"><i class="fas fa-eye"></i> 详情</a>
                        </td>
                    </tr>
                    {% endfor %}
                    {% else %}
                    <tr>
                        <td colspan="5" class="text-center text-muted"><i class="fas fa-check-circle me-2"></i>暂无采购订单
                        </td>
                    </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
        <div class="text-center back-link mt-3">
            <a href="/procurement" class="btn btn-outline-success"><i class="fas fa-arrow-left me-1"></i>返回采购员主页</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
